org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Opt out of AGP 9 new DSL — keeps compatibility with Flutter Gradle Plugin
android.newDsl=false
# Suppress KGP warning from plugins (print_bluetooth_thermal, share_plus)
# These warnings are non-fatal; actual Kotlin compilation uses built-in KGP via Flutter
kotlin.native.ignoreIncorrectDependencies=true
